<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Яцы</title>
    <meta name="description" content="Яцы — покер на костях. C# MVC + React." />
    <script>
      window.addEventListener('error', function(e) {
        alert('JS Error:\n' + e.message + '\nAt: ' + e.filename + ':' + e.lineno + '\nStack:\n' + (e.error ? e.error.stack : ''));
      });
      window.addEventListener('unhandledrejection', function(e) {
        alert('Unhandled Rejection:\n' + e.reason);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
